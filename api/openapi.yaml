openapi: 3.1.0
info:
  title: SkillRoom API
  version: 0.1.0
  description: |
    SkillRoom exposes a Go modular monolith API for auth, challenge lifecycle,
    execution previews, scored submissions, rankings, and HR review.
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
  - name: Profile
  - name: Challenges
  - name: AI
  - name: Social
  - name: Rankings
  - name: HR
paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: candidate@example.com
              username: candidate-one
              password: Passw0rd!
              role: user
              country: US
      responses:
        '201':
          description: Auth tokens for the newly registered user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Refreshed auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /v1/me:
    get:
      tags: [Profile]
      security:
        - BearerAuth: []
      summary: Get the authenticated user record
      responses:
        '200':
          description: Current user with embedded profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/profile:
    get:
      tags: [Profile]
      security:
        - BearerAuth: []
      summary: Get the current developer profile
      responses:
        '200':
          description: Profile with score and confidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                user_id: usr_123
                selected_track: react
                linkedin_url: https://linkedin.com/in/candidate-one
                current_skill_score: 612.4
                percentile_global: 89
                percentile_country: 83
                streak_days: 3
                confidence_score: 78
                confidence_level: medium
                confidence_reasons:
                  - Multiple completed tasks make the score more stable.
                completed_challenges: 8
                updated_at: '2025-01-16T12:00:00Z'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Profile]
      security:
        - BearerAuth: []
      summary: Update the current developer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              linkedin_url: https://linkedin.com/in/candidate-one
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /v1/skills:
    get:
      tags: [Profile]
      security:
        - BearerAuth: []
      summary: Get the current user skill breakdown
      responses:
        '200':
          description: Skill entries used for score and room mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/room:
    get:
      tags: [Profile]
      security:
        - BearerAuth: []
      summary: Get the current user room state
      responses:
        '200':
          description: Room items mapped from current skill levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
              example:
                items:
                  - room_item_code: monitor
                    current_level: silver
                    current_variant: monitor-silver
                    state_json:
                      skill: react
                      explanation: React score unlocked a silver monitor tier.
                  - room_item_code: chair
                    current_level: bronze
                    current_variant: chair-bronze
                    state_json:
                      skill: architecture
                      explanation: Architecture score currently maps to the starter chair tier.
                  - room_item_code: trophy_case
                    current_level: bronze
                    current_variant: trophy_case_default
                    state_json:
                      presentation_mode: achievement_case
                      achievement_count: 2
                      achievements:
                        - code: percentile_top_10
                          title: Top 10% globally
                          description: Reached the global top 10 percent of candidates.
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/monetization/summary:
    get:
      tags: [Monetization]
      security:
        - BearerAuth: []
      summary: Get the current user's plan, entitlement, and usage snapshot
      responses:
        '200':
          description: Monetization summary for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonetizationSummary'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/dev/cosmetics/catalog:
    get:
      tags: [Monetization]
      security:
        - BearerAuth: []
      summary: List available developer room cosmetics
      responses:
        '200':
          description: Cosmetic catalog for developer room customization
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalog:
                    type: array
                    items:
                      $ref: '#/components/schemas/CosmeticCatalogItem'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /v1/dev/cosmetics/inventory:
    get:
      tags: [Monetization]
      security:
        - BearerAuth: []
      summary: Get the authenticated developer cosmetic catalog, ownership, and equipped state
      responses:
        '200':
          description: Cosmetic inventory and equipped state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CosmeticInventoryResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /v1/challenges/templates:
    get:
      tags: [Challenges]
      security:
        - BearerAuth: []
      summary: List challenge templates
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Optional category filter
      responses:
        '200':
          description: Challenge catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChallengeTemplate'
  /v1/challenges/instances:
    post:
      tags: [Challenges]
      security:
        - BearerAuth: []
      summary: Start a challenge instance
      description: Product-level equivalent of starting `/challenges/{id}/start`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartChallengeRequest'
            example:
              template_id: react_debug_resize_cleanup
      responses:
        '201':
          description: Generated challenge instance and variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeInstanceView'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/challenges/instances/{instanceID}:
    get:
      tags: [Challenges]
      security:
        - BearerAuth: []
      summary: Fetch a running challenge instance
      parameters:
        - $ref: '#/components/parameters/InstanceID'
      responses:
        '200':
          description: Challenge instance view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeInstanceView'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /v1/challenges/instances/{instanceID}/telemetry:
    post:
      tags: [Challenges]
      security:
        - BearerAuth: []
      summary: Record challenge telemetry for anti-cheat and confidence signals
      parameters:
        - $ref: '#/components/parameters/InstanceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryEventRequest'
      responses:
        '201':
          description: Telemetry accepted with updated summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/challenges/instances/{instanceID}/runs:
    post:
      tags: [Challenges]
      security:
        - BearerAuth: []
      summary: Execute a preview run in the runner
      parameters:
        - $ref: '#/components/parameters/InstanceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitChallengeRequest'
      responses:
        '200':
          description: Preview execution report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPreviewResponse'
              example:
                status: completed
                instance_id: chg_123
                template_id: react_debug_resize_cleanup
                execution:
                  tests_passed: 2
                  tests_total: 4
                  quality_passed: 1
                  quality_failed: 0
                  lint_errors: 0
                  lint_warnings: 1
                  execution_cost_ms: 38
                  execution_time_ms: 38
                  errors: []
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/challenges/instances/{instanceID}/submissions:
    post:
      tags: [Challenges]
      security:
        - BearerAuth: []
      summary: Submit a solution for scoring
      parameters:
        - $ref: '#/components/parameters/InstanceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitChallengeRequest'
            example:
              language: jsx
              source_files:
                src/App.jsx: |
                  export default function App() {
                    return null;
                  }
      responses:
        '201':
          description: Submission, execution report, evaluation, and updated profile state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
              example:
                template_id: react_debug_resize_cleanup
                instance_id: chg_123
                execution:
                  tests_passed: 4
                  tests_total: 4
                  quality_passed: 1
                  quality_failed: 0
                  execution_cost_ms: 34
                  execution_time_ms: 34
                evaluation:
                  final_score: 88.4
                  test_score: 100
                  quality_score: 85
                  execution_cost_score: 100
                  speed_score: 100
                  consistency_score: 57
                  report_json:
                    lint_quality: 85
                    task_quality: 100
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/ai/challenges/{instanceID}/hint:
    post:
      tags: [AI]
      security:
        - BearerAuth: []
      summary: Request a limited AI hint for the active challenge
      parameters:
        - $ref: '#/components/parameters/InstanceID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIHintRequest'
      responses:
        '200':
          description: Hint response with remaining allowance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIHintResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/ai/challenges/{instanceID}/explain:
    post:
      tags: [AI]
      security:
        - BearerAuth: []
      summary: Explain the evaluation for a submitted challenge
      parameters:
        - $ref: '#/components/parameters/InstanceID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIExplanationRequest'
      responses:
        '200':
          description: Evaluation explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIExplanationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/rankings/global:
    get:
      tags: [Rankings]
      security:
        - BearerAuth: []
      summary: Fetch the global ranking
      responses:
        '200':
          description: Ranked candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  rankings:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankingEntry'
  /v1/rankings/country:
    get:
      tags: [Rankings]
      security:
        - BearerAuth: []
      summary: Fetch the ranking scoped to the authenticated user's country
      responses:
        '200':
          description: Country ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/rankings/friends:
    get:
      tags: [Rankings]
      security:
        - BearerAuth: []
      summary: Fetch the ranking scoped to the authenticated user's friends
      responses:
        '200':
          description: Friends ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingsResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/friends/{userID}/request:
    post:
      tags: [Social]
      security:
        - BearerAuth: []
      summary: Send a friend request
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '201':
          description: Friend request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/friends/{userID}/accept:
    post:
      tags: [Social]
      security:
        - BearerAuth: []
      summary: Accept a friend request
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Friend request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/chat/direct/{userID}/messages:
    get:
      tags: [Social]
      security:
        - BearerAuth: []
      summary: List direct chat messages between the current user and another user
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Direct chat history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessagesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Social]
      security:
        - BearerAuth: []
      summary: Send a direct chat message
      parameters:
        - $ref: '#/components/parameters/UserID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '201':
          description: Created message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/candidates:
    get:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Search candidate cards for recruiters
      parameters:
        - in: query
          name: min_score
          schema:
            type: number
        - in: query
          name: min_confidence
          schema:
            type: number
        - in: query
          name: top_percent
          schema:
            type: number
        - in: query
          name: active_days
          schema:
            type: integer
      responses:
        '200':
          description: Candidate cards with trust context
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: '#/components/schemas/CandidateView'
                  monetization:
                    $ref: '#/components/schemas/MonetizationSummary'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/candidates/{userID}:
    get:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Get recruiter-facing candidate detail with unlock gating
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: Candidate preview or unlocked full detail depending recruiter access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateDetailView'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/candidates/{userID}/unlock:
    post:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Unlock a candidate's full profile and contact data
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '201':
          description: Candidate unlocked and full detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateDetailView'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/candidates/{userID}/invite:
    post:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Invite an already-unlocked candidate
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '201':
          description: Candidate marked as invited and updated detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateDetailView'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/leaderboard:
    get:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: List recruiter-facing candidate leaderboard entries
      responses:
        '200':
          description: Candidate leaderboard ordered by score, confidence, and recency
          content:
            application/json:
              schema:
                type: object
                properties:
                  rankings:
                    type: array
                    items:
                      $ref: '#/components/schemas/CandidateView'
                  monetization:
                    $ref: '#/components/schemas/MonetizationSummary'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/companies:
    post:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Create a recruiter company profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
      responses:
        '201':
          description: Created company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/companies/{companyID}/jobs:
    post:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Create a job under a recruiter company
      parameters:
        - $ref: '#/components/parameters/CompanyID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
      responses:
        '201':
          description: Created job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/shortlists:
    post:
      tags: [HR]
      security:
        - BearerAuth: []
      summary: Add a candidate to a shortlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortlistRequest'
      responses:
        '201':
          description: Created shortlist entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HRShortlist'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /v1/hr/ai/templates/{templateID}/mutation-preview:
    post:
      tags: [HR, AI]
      security:
        - BearerAuth: []
      summary: Preview an AI-assisted deterministic mutation for an HR-visible challenge template
      parameters:
        - $ref: '#/components/parameters/TemplateID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIMutationPreviewRequest'
      responses:
        '200':
          description: Mutation preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIMutationPreviewResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    InstanceID:
      in: path
      name: instanceID
      required: true
      schema:
        type: string
    UserID:
      in: path
      name: userID
      required: true
      schema:
        type: string
    CompanyID:
      in: path
      name: companyID
      required: true
      schema:
        type: string
    TemplateID:
      in: path
      name: templateID
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [user, hr, admin]
        country:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
        role:
          type: string
        country:
          type: string
        created_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
        profile:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      properties:
        user_id:
          type: string
        selected_track:
          type: string
        linkedin_url:
          type: string
          format: uri
        current_skill_score:
          type: number
        percentile_global:
          type: number
        percentile_country:
          type: number
        streak_days:
          type: integer
        confidence_score:
          type: number
        confidence_level:
          type: string
        confidence_reasons:
          type: array
          items:
            type: string
        completed_challenges:
          type: integer
        updated_at:
          type: string
          format: date-time
      additionalProperties: true
    SkillsResponse:
      type: object
      properties:
        skills:
          type: array
          items:
            $ref: '#/components/schemas/UserSkill'
    ChallengeTemplate:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        difficulty:
          type: integer
        description_md:
          type: string
        category:
          type: string
        track:
          type: string
        editable_files:
          type: array
          items:
            type: string
        evaluation_config_json:
          $ref: '#/components/schemas/EvaluationConfig'
        skill_weights:
          type: object
          additionalProperties:
            type: number
    EvaluationConfig:
      type: object
      properties:
        median_solve_seconds:
          type: integer
        median_exec_ms:
          type: integer
        max_attempts:
          type: integer
        timeout_ms:
          type: integer
        memory_mb:
          type: integer
        lint_quality_weight:
          type: number
        task_quality_weight:
