name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Go tests
        run: go test -mod=mod ./...

      - name: Build frontend container
        run: docker build -f deploy/frontend.Dockerfile -t mvp-frontend:ci .

      - name: Build backend container
        run: docker build -f deploy/backend.Dockerfile -t mvp-backend:ci .

      - name: Build runner container
        run: docker build -f deploy/runner.Dockerfile -t mvp-runner:ci .

      - name: Validate Docker Compose file
        run: docker compose -f deploy/docker-compose.yml config

      - name: Install Playwright browser
        run: npx -y playwright@1.52.0 install --with-deps chromium

      - name: Start stack for browser smoke
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Run browser smoke tests
        run: npx -y playwright@1.52.0 test -c frontend/playwright.config.mjs

      - name: Stop stack
        if: always()
        run: docker compose -f deploy/docker-compose.yml down
