name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Go tests
        run: go test -mod=mod ./...

      - name: Check frontend script syntax
        run: node --check web/app.js

      - name: Build backend container
        run: docker build -f deploy/backend.Dockerfile -t mvp-backend:ci .

      - name: Build runner container
        run: docker build -f deploy/runner.Dockerfile -t mvp-runner:ci .

      - name: Validate Docker Compose file
        run: docker compose -f deploy/docker-compose.yml config
